<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1033"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bgGrad)"/>

  <!-- Pins left -->
  <rect x="16" y="56" width="18" height="10" rx="5" fill="#a855f7" opacity="0.85"/>
  <rect x="16" y="85" width="18" height="10" rx="5" fill="#a855f7" opacity="0.85"/>
  <rect x="16" y="114" width="18" height="10" rx="5" fill="#a855f7" opacity="0.85"/>

  <!-- Pins right -->
  <rect x="146" y="56" width="18" height="10" rx="5" fill="#a855f7" opacity="0.85"/>
  <rect x="146" y="85" width="18" height="10" rx="5" fill="#a855f7" opacity="0.85"/>
  <rect x="146" y="114" width="18" height="10" rx="5" fill="#a855f7" opacity="0.85"/>

  <!-- Pins top -->
  <rect x="56" y="16" width="10" height="18" rx="5" fill="#a855f7" opacity="0.85"/>
  <rect x="85" y="16" width="10" height="18" rx="5" fill="#a855f7" opacity="0.85"/>
  <rect x="114" y="16" width="10" height="18" rx="5" fill="#a855f7" opacity="0.85"/>

  <!-- Pins bottom -->
  <rect x="56" y="146" width="10" height="18" rx="5" fill="#a855f7" opacity="0.85"/>
  <rect x="85" y="146" width="10" height="18" rx="5" fill="#a855f7" opacity="0.85"/>
  <rect x="114" y="146" width="10" height="18" rx="5" fill="#a855f7" opacity="0.85"/>

  <!-- Chip body -->
  <rect x="34" y="34" width="112" height="112" rx="22" fill="url(#chipGrad)"/>

  <!-- Circuit lines -->
  <line x1="34" y1="97" x2="146" y2="97" stroke="white" stroke-width="2.5" opacity="0.2"/>
  <line x1="97" y1="34" x2="97" y2="146" stroke="white" stroke-width="2.5" opacity="0.2"/>

  <!-- Center ring -->
  <circle cx="90" cy="90" r="26" fill="url(#innerGrad)" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>

  <!-- Center dot -->
  <circle cx="90" cy="90" r="11" fill="white" opacity="0.92"/>
  <circle cx="90" cy="90" r="5" fill="url(#chipGrad)"/>

  <!-- Shine -->
  <rect x="34" y="34" width="112" height="50" rx="22" fill="white" opacity="0.06"/>
</svg>
